name: SMIM Daily Publish

on:
  schedule:
    # KST = UTC+9. 한국장 개장(09:00 KST)까지 여유를 크게 두고 05:03부터 07:33까지
    # 30분 간격 6단 트리거. GitHub Actions 스케줄은 정시(:00/:30) 근처에 몰릴 때
    # 지연이 심해진다는 게 GitHub 공식 안내라(2026-07-15 실제로 2시간 넘게 밀린 적 있음)
    # 분 단위를 :03/:33처럼 정시에서 살짝 비켜뒀다.
    - cron: '3 20 * * 0-4'    # KST 05:03 (월~금)
    - cron: '33 20 * * 0-4'   # KST 05:33 백업
    - cron: '3 21 * * 0-4'    # KST 06:03 백업
    - cron: '33 21 * * 0-4'   # KST 06:33 백업
    - cron: '3 22 * * 0-4'    # KST 07:03 백업
    - cron: '33 22 * * 0-4'   # KST 07:33 백업
    # 미국장 개장(09:30 ET) 전 6단 트리거. UTC 9:03~11:33은 서머타임(EDT, UTC-4)·
    # 표준시(EST, UTC-5) 어느 쪽이든 항상 개장 2시간 이상 전이라 DST 전환에 안전하다.
    - cron: '3 9 * * 1-5'     # 개장 전(서머타임 기준 05:03 ET)
    - cron: '33 9 * * 1-5'    # 백업
    - cron: '3 10 * * 1-5'    # 백업
    - cron: '33 10 * * 1-5'   # 백업
    - cron: '3 11 * * 1-5'    # 백업
    - cron: '33 11 * * 1-5'   # 백업
  workflow_dispatch:          # 폰에서 버튼으로 수동 실행
    inputs:
      market:
        description: '수동 실행 시 발행할 시장'
        required: false
        default: 'kr'
        type: choice
        options: [kr, us]

concurrency:
  group: smim-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-kr:
    if: >
      (github.event_name == 'schedule' &&
       contains(fromJSON('["3 20 * * 0-4","33 20 * * 0-4","3 21 * * 0-4","33 21 * * 0-4","3 22 * * 0-4","33 22 * * 0-4"]'), github.event.schedule)) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.market == 'kr')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline (KR)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://smim.kr
        run: python run_daily.py --market kr

      - name: Commit snapshot & site
        run: |
          git config user.name  "smim-bot"
          git config user.email "bot@smim.kr"
          git add data site
          git diff --staged --quiet || git commit -m "SMIM KR $(TZ=Asia/Seoul date +%Y-%m-%d) 발행"
          git pull --rebase --autostash
          git push

  publish-us:
    if: >
      (github.event_name == 'schedule' &&
       contains(fromJSON('["3 9 * * 1-5","33 9 * * 1-5","3 10 * * 1-5","33 10 * * 1-5","3 11 * * 1-5","33 11 * * 1-5"]'), github.event.schedule)) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.market == 'us')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline (US)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # SEC EDGAR는 키가 없다 — User-Agent만 요구(config.py 기본값 사용).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://smim.kr
        run: python run_daily.py --market us

      - name: Commit snapshot & site
        run: |
          git config user.name  "smim-bot"
          git config user.email "bot@smim.kr"
          git add data site
          git diff --staged --quiet || git commit -m "SMIM US $(TZ=America/New_York date +%Y-%m-%d) 발행"
          git pull --rebase --autostash
          git push
